<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Currency Exchange</title>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">

<style>

/* ===== GREY / BLACK TRADING CONSOLE ===== */

:root{
  --bg:#0e0e0e;
  --case:#1a1a1a;
  --screen:#2b2b2b;
  --text:#e5e5e5;
  --border:#444;
  --button:#2c2c2c;
  --button-hover:#3a3a3a;
}

*{box-sizing:border-box;}

body{
  margin:0;
  background:var(--bg);
  display:flex;
  justify-content:center;
  padding:30px;
  font-family:"Courier Prime", monospace;
  color:var(--text);
}

.container{
  width:900px;
  background:var(--case);
  padding:22px;
  border:1px solid var(--border);
  border-radius:12px;
}

/* ===== HEADER ===== */

h1{
  text-align:center;
  font-size:22px;
  letter-spacing:3px;
  margin:0 0 15px 0;
}

/* ===== SCREEN AREA ===== */

.screen{
  background:var(--screen);
  border:1px solid var(--border);
  padding:15px;
  margin-top:15px;
}

/* ===== TABLE ===== */

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th,td{
  padding:6px;
  border-bottom:1px solid var(--border);
}

/* ===== BUTTONS ===== */

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  background:var(--button);
  color:var(--text);
  border:1px solid var(--border);
  font-family:inherit;
  font-size:15px;
  cursor:pointer;
  transition:0.15s;
}

button:hover{
  background:var(--button-hover);
}

button:active{
  transform:translateY(1px);
}

/* ===== INPUT ===== */

input{
  width:100%;
  padding:10px;
  background:var(--screen);
  border:1px solid var(--border);
  color:var(--text);
  font-family:inherit;
  margin-top:8px;
}

/* ===== PANELS ===== */

.panel{
  margin-top:15px;
  background:var(--screen);
  border:1px solid var(--border);
  padding:12px;
}

/* ===== TEXT ===== */

.balance,
#payout{
  font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<h1>CURRENCY EXCHANGE</h1>

<button onclick="facebookLogin()">LOGIN</button>

<div class="screen">

<table>
<thead>
<tr>
<th>PAIR</th>
<th>VALUE</th>
<th>Δ</th>
<th>%</th>
<th>ALLOC</th>
</tr>
</thead>
<tbody id="tradeTable"></tbody>
</table>

</div>

<div class="panel">

ADD FUNDS
<input type="number" id="fundInput" placeholder="USD Amount"/>
<button onclick="addFunds()">ADD</button>

<div style="margin-top:8px;">
BALANCE: $<span id="balance">0</span>
</div>

</div>

<div class="panel">

DAILY PAYOUT (30%)
<div id="payout">$0</div>
<p>JPMorgan Chase & Co.</p>

</div>

<button onclick="runAI()">RUN AI</button>
<button onclick="runDistribution()">DISTRIBUTE</button>

</div>

<script>

const API="http://localhost:4000/api"

let balance=0

const trades=[
"EURUSD","USDJPY","GBPUSD","AUDUSD","USDCAD",
"USDCHF","EURJPY","EURGBP","USDHKD","EURCHF","USDKRW"
]

let previous={}
let prices={}

/* ===== BUILD TABLE ===== */

function buildTable(){

const table=document.getElementById("tradeTable")

trades.forEach((pair,i)=>{

const row=document.createElement("tr")

row.innerHTML=`
<td>${pair}</td>
<td id="${pair}">--</td>
<td id="change${pair}">-</td>
<td id="net${pair}">-</td>
<td id="alloc${i+1}">$0</td>
`

table.appendChild(row)

})

}

/* ===== LOAD FOREX ===== */

async function loadForex(){

const res=await fetch("https://api.exchangerate.host/latest?base=USD")
const data=await res.json()
const r=data.rates

prices={
EURUSD:1/r.EUR,
USDJPY:r.JPY,
GBPUSD:1/r.GBP,
AUDUSD:1/r.AUD,
USDCAD:r.CAD,
USDCHF:r.CHF,
EURJPY:r.JPY/r.EUR,
EURGBP:r.GBP/r.EUR,
USDHKD:r.HKD,
EURCHF:r.CHF/r.EUR,
USDKRW:r.KRW
}

}

/* ===== UPDATE UI ===== */

function updateTrades(){

Object.keys(prices).forEach(pair=>{

const base=prices[pair]
const simulated=base+(Math.random()-0.5)*base*0.0005

document.getElementById(pair).innerText=
simulated.toFixed(4)

if(previous[pair]){

const diff=simulated-previous[pair]
const percent=(diff/previous[pair])*100

document.getElementById("change"+pair).innerText=
diff.toFixed(5)

document.getElementById("net"+pair).innerText=
percent.toFixed(3)+"%"

}

previous[pair]=simulated

})

}

/* ===== ADD FUNDS ===== */

async function addFunds(){

const amount=parseFloat(
document.getElementById("fundInput").value
)

if(!amount||amount<=0) return

await fetch(API+"/stripe/deposit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({amount})
})

balance+=amount
document.getElementById("balance").innerText=
balance.toFixed(2)

}

/* ===== AI ===== */

async function runAI(){
await fetch(API+"/ai/run",{method:"POST"})
alert("AI ENGINE ACTIVE")
}

/* ===== DISTRIBUTION ===== */

async function runDistribution(){

if(balance<=0) return

const allocation=balance/trades.length

for(let i=1;i<=trades.length;i++){
document.getElementById("alloc"+i).innerText=
"$"+allocation.toFixed(2)
}

await fetch(API+"/portfolio/distribute",{method:"POST"})

}

/* ===== FACEBOOK LOGIN ===== */

window.fbAsyncInit=function(){
FB.init({
appId:"FACEBOOK_APP_ID",
cookie:true,
xfbml:true,
version:"v19.0"
})
}

function facebookLogin(){
FB.login(function(response){
if(response.authResponse){
fetch(API+"/auth/facebook",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(response.authResponse)
})
}
})
}

/* ===== INIT ===== */

buildTable()
loadForex()

setInterval(loadForex,10000)
setInterval(updateTrades,1000)

</script>

<script async defer
src="https://connect.facebook.net/en_US/sdk.js">
</script>

</body>
</html>
