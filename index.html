<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Currency Exchange</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Roboto+Mono&display=swap" rel="stylesheet">

<script async defer crossorigin="anonymous"
src="https://connect.facebook.net/en_US/sdk.js"></script>

<style>

:root{
--bg:#000;
--text:#fff;
--border:#fff;
}

*{box-sizing:border-box;}

body{
margin:0;
padding:40px;
background:var(--bg);
color:var(--text);
font-family:"JetBrains Mono","Roboto Mono","SF Mono",monospace;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
font-size:28px;
letter-spacing:2px;
border-bottom:1px solid white;
padding-bottom:10px;
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid white;
text-align:left;
}

.panel{
margin-top:40px;
border:1px solid white;
padding:20px;
}

button{
width:100%;
margin-top:20px;
padding:12px;
background:black;
color:white;
border:1px solid white;
cursor:pointer;
font-family:inherit;
}

button:hover{
background:white;
color:black;
}

input{
width:100%;
padding:12px;
background:black;
border:1px solid white;
color:white;
font-family:inherit;
margin-top:10px;
}

.balance{
font-size:20px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>CURRENCY EXCHANGE</h1>

<button onclick="facebookLogin()">LOGIN WITH FACEBOOK</button>

<table>

<thead>
<tr>
<th>TRADE</th>
<th>VALUE</th>
<th>CHANGE</th>
<th>NET CHANGE</th>
<th>ALLOCATED</th>
</tr>
</thead>

<tbody>

<tr><td>EUR-USD</td><td id="EURUSD">--</td><td>-</td><td>-</td><td id="alloc1">$0</td></tr>
<tr><td>USD-JPY</td><td id="USDJPY">--</td><td>-</td><td>-</td><td id="alloc2">$0</td></tr>
<tr><td>GBP-USD</td><td id="GBPUSD">--</td><td>-</td><td>-</td><td id="alloc3">$0</td></tr>
<tr><td>AUD-USD</td><td id="AUDUSD">--</td><td>-</td><td>-</td><td id="alloc4">$0</td></tr>
<tr><td>USD-CAD</td><td id="USDCAD">--</td><td>-</td><td>-</td><td id="alloc5">$0</td></tr>
<tr><td>USD-CHF</td><td id="USDCHF">--</td><td>-</td><td>-</td><td id="alloc6">$0</td></tr>
<tr><td>EUR-JPY</td><td id="EURJPY">--</td><td>-</td><td>-</td><td id="alloc7">$0</td></tr>
<tr><td>EUR-GBP</td><td id="EURGBP">--</td><td>-</td><td>-</td><td id="alloc8">$0</td></tr>
<tr><td>USD-HKD</td><td id="USDHKD">--</td><td>-</td><td>-</td><td id="alloc9">$0</td></tr>
<tr><td>EUR-CHF</td><td id="EURCHF">--</td><td>-</td><td>-</td><td id="alloc10">$0</td></tr>
<tr><td>USD-KRW</td><td id="USDKRW">--</td><td>-</td><td>-</td><td id="alloc11">$0</td></tr>

</tbody>

</table>

<div class="panel">

<strong>ADD FUNDS</strong>

<input type="number" id="fundInput" placeholder="Enter USD amount"/>

<button onclick="addFunds()">ADD FUNDS</button>

<div class="balance">
BALANCE: $<span id="balance">0</span>
</div>

</div>

<div class="panel">

<strong>DAILY PAYOUT</strong>

<p id="payout">$0</p>

<p><strong>JPMorgan Chase & Co.</strong></p>

</div>

<button onclick="runAI()">RUN AI TRADING</button>

<button onclick="runDistribution()">RUN DISTRIBUTION</button>

</div>

<script>

const API = "http://localhost:4000/api"

let balance = 0

/* -----------------------
FACEBOOK LOGIN
----------------------- */

window.fbAsyncInit = function() {

FB.init({
appId : 'FACEBOOK_APP_ID',
cookie : true,
xfbml : true,
version : 'v19.0'
})

}

function facebookLogin(){

FB.login(function(response){

if(response.authResponse){

fetch(API + "/auth/facebook",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify(response.authResponse)
})

}

})

}

/* -----------------------
ADD FUNDS VIA STRIPE
----------------------- */

async function addFunds(){

const input = document.getElementById("fundInput")

const amount = parseFloat(input.value)

if(!amount || amount <= 0){
alert("Enter valid amount")
return
}

const res = await fetch(API + "/stripe/deposit",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({amount})

})

const data = await res.json()

balance += amount

document.getElementById("balance").innerText = balance.toFixed(2)

input.value=""

}

/* -----------------------
AI TRADING
----------------------- */

async function runAI(){

await fetch(API + "/ai/run",{

method:"POST"

})

alert("AI trading engine started")

}

/* -----------------------
DISTRIBUTION
----------------------- */

async function runDistribution(){

const rows = 11

if(balance <= 0){
alert("No funds available")
return
}

const allocation = balance / rows

for(let i=1;i<=rows;i++){

document.getElementById("alloc"+i).innerText =
"$" + allocation.toFixed(2)

}

await fetch(API + "/portfolio/distribute",{
method:"POST"
})

}

/* -----------------------
FOREX DATA
----------------------- */

async function loadForex(){

const res = await fetch("https://api.exchangerate.host/latest?base=USD")

const data = await res.json()

const r = data.rates

document.getElementById("EURUSD").innerText = (1/r.EUR).toFixed(4)
document.getElementById("USDJPY").innerText = r.JPY.toFixed(2)
document.getElementById("GBPUSD").innerText = (1/r.GBP).toFixed(4)
document.getElementById("AUDUSD").innerText = (1/r.AUD).toFixed(4)
document.getElementById("USDCAD").innerText = r.CAD.toFixed(4)
document.getElementById("USDCHF").innerText = r.CHF.toFixed(4)
document.getElementById("EURJPY").innerText = (r.JPY/r.EUR).toFixed(2)
document.getElementById("EURGBP").innerText = (r.GBP/r.EUR).toFixed(4)
document.getElementById("USDHKD").innerText = r.HKD.toFixed(4)
document.getElementById("EURCHF").innerText = (r.CHF/r.EUR).toFixed(4)
document.getElementById("USDKRW").innerText = r.KRW.toFixed(2)

}

/* -----------------------
PORTFOLIO SYNC
----------------------- */

async function loadPortfolio(){

const res = await fetch(API + "/portfolio")

const data = await res.json()

balance = data.balance

document.getElementById("balance").innerText = balance.toFixed(2)

document.getElementById("payout").innerText =
"$" + data.dailyProfit

}

/* -----------------------
AUTO RUN
----------------------- */

loadForex()

loadPortfolio()

setInterval(loadForex,1000)

setInterval(loadPortfolio,1000)

</script>

</body>

</html>
