<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Currency Exchange</title>

<!-- 🌍 FAVICON -->
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/44/44386.png"/>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>

<style>
:root{--bg:#d4d4d4;--text:#000;}
body{margin:0;padding:40px;background:var(--bg);font-family:"JetBrains Mono",monospace;}
.container{max-width:1000px;margin:auto;}

h1{text-align:center;border-bottom:1px solid black;padding-bottom:10px;}

.nav-links{display:flex;justify-content:center;gap:20px;margin-bottom:30px;}
.nav-link{opacity:.6;text-decoration:none;color:black;}
.nav-link.active{opacity:1;border-bottom:1px solid black;}

.panel{margin-top:20px;border:1px solid black;padding:20px;text-align:center;}

input,select,button{
  width:100%;padding:12px;margin-top:10px;
  background:black;color:white;border:1px solid black;
}

/* dropdown arrow */
.select-wrap{position:relative;}
.select-wrap:after{
  content:"▼";
  position:absolute;right:12px;top:50%;
  transform:translateY(-50%);
  color:white;font-size:12px;
}

table{width:100%;margin-top:20px;border-collapse:collapse;}
th,td{padding:12px;border-bottom:1px solid black;text-align:center;}

.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.6);
  display:none;justify-content:center;align-items:center;
}
.modal-content{background:#d4d4d4;padding:25px;width:350px;border:1px solid black;}

.footer{text-align:center;margin-top:40px;font-size:12px;}
</style>
</head>

<body>
<div class="container">

<div class="nav-links">
<a href="#" class="nav-link active" onclick="switchView('market',this)">MARKET</a>
<a href="#" class="nav-link" onclick="switchView('transactions',this)">TRANSACTIONS</a>
</div>

<!-- MARKET -->
<div id="marketView">
<h1>CURRENCY EXCHANGE</h1>

<div class="panel">
<strong>BALANCE</strong>
<p id="balance">$0</p>
</div>

<div class="panel">
<strong>DAILY PAYOUT</strong>
<input type="number" id="payoutPercent" placeholder="%"/>
<input type="number" id="payoutFixed" placeholder="Fixed"/>
<button onclick="updatePayout()">UPDATE</button>
<p id="payout">$0</p>
</div>

<div class="panel">
<strong>TOTAL EARNED</strong>
<p id="totalEarned">$0</p>
</div>

<div class="panel">
<button onclick="openDepositModal()">DEPOSIT FUNDS</button>
</div>

</div>

<!-- TRANSACTIONS -->
<div id="transactionsView" style="display:none;">
<h1>LEDGER</h1>

<div class="panel">
<input type="number" id="sendAmount" placeholder="Send amount"/>
<button onclick="sendFiat()">SEND</button>
</div>

<table>
<thead>
<tr>
<th>DATE</th>
<th>TYPE</th>
<th>AMOUNT</th>
<th>BALANCE</th>
<th>STATUS</th>
</tr>
</thead>
<tbody id="txTable"></tbody>
</table>
</div>

<!-- MODAL -->
<div id="depositModal" class="modal" onclick="outsideClose(event)">
<div class="modal-content">

<h3>Deposit Funds</h3>

<div class="select-wrap">
<select id="currencySelect">
<option value="USD">$ USD</option>
<option value="EUR">€ EUR</option>
<option value="GBP">£ GBP</option>
<option value="JPY">¥ JPY</option>
</select>
</div>

<input type="number" id="fundInput" placeholder="Enter amount"/>

<button onclick="depositFunds()">Confirm</button>

</div>
</div>

<div class="footer">
© <span id="year"></span> Clean, Inc.
</div>

</div>

<script>
const API="http://localhost:4000/api";
let balance=0,totalEarned=0,transactions=[];
let payoutPercent=0,payoutFixed=0;

const symbols={USD:"$",EUR:"€",GBP:"£",JPY:"¥"};

document.getElementById("year").innerText=new Date().getFullYear();

/* NAV */
function switchView(v,el){
event.preventDefault();
marketView.style.display=v==="market"?"block":"none";
transactionsView.style.display=v==="transactions"?"block":"none";
document.querySelectorAll(".nav-link").forEach(l=>l.classList.remove("active"));
el.classList.add("active");
}

/* MODAL */
function openDepositModal(){depositModal.style.display="flex";}
function outsideClose(e){if(e.target.id==="depositModal") closeDepositModal();}
function closeDepositModal(){depositModal.style.display="none";}

/* DEPOSIT */
async function depositFunds(){
let amt=parseFloat(fundInput.value);
let cur=currencySelect.value;

if(!amt||amt<=0) return alert("Invalid amount");

try{
await fetch(API+"/stripe/deposit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({amount:amt,currency:cur})
});

balance+=amt;

addTx("DEPOSIT",amt,"success");

}catch(e){
addTx("DEPOSIT",amt,"failed");
alert("Deposit failed");
}

updateUI();
closeDepositModal();
}

/* SEND */
function sendFiat(){
let amt=parseFloat(sendAmount.value);

if(!amt||amt<=0) return alert("Invalid amount");

if(amt>balance){
addTx("SEND",amt,"failed");
return alert("Insufficient balance");
}

balance-=amt;
addTx("SEND",-amt,"success");

updateUI();
}

/* PAYOUT */
function updatePayout(){
payoutPercent=parseFloat(document.getElementById("payoutPercent").value)||0;
payoutFixed=parseFloat(document.getElementById("payoutFixed").value)||0;

let payout=(balance*(payoutPercent/100))+payoutFixed;

if(payout>balance){
return alert("Payout exceeds balance");
}

balance-=payout;
totalEarned+=payout;

addTx("PAYOUT",-payout,"success");

updateUI();
}

/* TX */
function addTx(type,amt,status){
transactions.unshift({
type,
amount:amt,
status,
balance,
time:new Date()
});
renderTx();
}

function renderTx(){
txTable.innerHTML="";
transactions.forEach(t=>{
let row=document.createElement("tr");
row.innerHTML=`
<td>${t.time.toLocaleString()}</td>
<td>${t.type}</td>
<td>${t.amount.toFixed(2)}</td>
<td>${t.balance.toFixed(2)}</td>
<td>${t.status}</td>`;
txTable.appendChild(row);
});
}

/* UI */
function updateUI(){
balanceEl.innerText="$"+balance.toFixed(2);
totalEarned.innerText="$"+totalEarned.toFixed(2);
let payoutCalc=(balance*(payoutPercent/100))+payoutFixed;
payout.innerText="$"+payoutCalc.toFixed(2);
}
</script>

</body>
</html>
