<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Currency Exchange</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>

<!-- 🌐 Globe Favicon -->
<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<circle cx='50' cy='50' r='45' stroke='black' stroke-width='5' fill='none'/>
<path d='M5 50h90M50 5a90 90 0 0 0 0 90M50 5a90 90 0 0 1 0 90' stroke='black' stroke-width='3'/>
</svg>">

<style>
:root{--bg:#d4d4d4;--text:#000;}
body{margin:0;padding:40px;background:var(--bg);font-family:"JetBrains Mono",monospace;}
.container{max-width:1000px;margin:auto;}
h1{text-align:center;border-bottom:1px solid black;padding-bottom:10px;}

.nav-links{display:flex;justify-content:center;gap:20px;margin-bottom:30px;}
.nav-link{cursor:pointer;opacity:0.6;}
.nav-link.active{opacity:1;border-bottom:1px solid black;}

.panel{margin-top:20px;border:1px solid black;padding:20px;text-align:center;}

input,select,button{
  width:100%;padding:12px;margin-top:10px;
  border:1px solid black;
}
input,select{background:black;color:white;}
button{background:black;color:white;cursor:pointer;}
button:hover{background:white;color:black;}

table{width:100%;margin-top:20px;border-collapse:collapse;}
th,td{border-bottom:1px solid black;padding:10px;text-align:center;}

.view{display:none;}
.view.active{display:block;}

.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;justify-content:center;align-items:center;
}
.modal-content{
  background:#d4d4d4;padding:25px;border:1px solid black;width:90%;max-width:400px;
}
.secondary{background:white;color:black;}

.footer{margin-top:40px;text-align:center;font-size:12px;}
</style>
</head>

<body>
<div class="container">

<!-- NAV -->
<div class="nav-links">
  <span class="nav-link active" onclick="switchView('market',this)">MARKET</span>
  <span class="nav-link" onclick="switchView('transactions',this)">TRANSACTIONS</span>
</div>

<!-- MARKET -->
<div id="marketView" class="view active">
<h1>CURRENCY EXCHANGE</h1>

<div class="panel">
<strong>GLOBAL DOLLAR</strong>
<p id="liveGlobal">$0</p>
</div>

<div class="panel">
<strong>ADD FUNDS</strong>
<button onclick="openDepositModal()">DEPOSIT</button>
</div>

<div class="panel"><strong>BALANCE</strong><p id="balanceDisplay">$0</p></div>

<div class="panel">
<strong>DAILY PAYOUT</strong>
<p id="payout">$0</p>
<input id="payoutPercentInput" placeholder="Payout %">
<input id="payoutFixedInput" placeholder="Fixed amount">
<button onclick="updatePayout()">Update</button>
</div>

<div class="panel"><strong>TOTAL EARNED</strong><p id="totalEarned">$0</p></div>
</div>

<!-- TRANSACTIONS -->
<div id="transactionsView" class="view">
<h1>TRANSACTIONS</h1>

<button onclick="openSendModal()">SEND FIAT</button>

<table>
<thead>
<tr><th>TYPE</th><th>AMOUNT</th><th>STATUS</th><th>TIME</th></tr>
</thead>
<tbody id="txTable"></tbody>
</table>
</div>

<!-- DEPOSIT MODAL -->
<div id="depositModal" class="modal">
<div class="modal-content">
<h2>Deposit Funds</h2>

<select id="currencySelect">
<option value="USD">$ USD</option>
<option value="EUR">€ EUR</option>
<option value="GBP">£ GBP</option>
<option value="JPY">¥ JPY</option>
</select>

<div style="position:relative;">
<span id="currencySymbol" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:white;">$</span>
<input id="fundInput" type="number" style="padding-left:30px;" placeholder="Enter amount"/>
</div>

<button onclick="depositFunds()">Submit</button>
<button class="secondary" onclick="closeDepositModal()">Cancel</button>
</div>
</div>

<!-- SEND MODAL -->
<div id="sendModal" class="modal">
<div class="modal-content">
<h2>Send Fiat</h2>

<input id="sendAmount" type="number" placeholder="Enter amount"/>

<button onclick="sendFiat()">Send</button>
<button class="secondary" onclick="closeSendModal()">Cancel</button>
</div>
</div>

<div class="footer">
© <span id="year"></span> Clean, Inc.
</div>

</div>

<script>
const API="http://localhost:4000/api";

let balance=0;
let payoutPercent=5;
let payoutFixed=0;

const symbols={USD:"$",EUR:"€",GBP:"£",JPY:"¥"};

document.getElementById("year").innerText=new Date().getFullYear();

/* NAV */
function switchView(view,el){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.querySelectorAll(".nav-link").forEach(l=>l.classList.remove("active"));
  if(view==="market")marketView.classList.add("active");
  if(view==="transactions"){transactionsView.classList.add("active");loadTransactions();}
  el.classList.add("active");
}

/* MODALS */
function openDepositModal(){depositModal.style.display="flex";}
function closeDepositModal(){depositModal.style.display="none";}
function openSendModal(){sendModal.style.display="flex";}
function closeSendModal(){sendModal.style.display="none";}

/* CLOSE OUTSIDE */
window.onclick=(e)=>{
  if(e.target===depositModal)closeDepositModal();
  if(e.target===sendModal)closeSendModal();
};

/* SYMBOL UPDATE */
currencySelect.onchange=()=>{
  currencySymbol.innerText=symbols[currencySelect.value];
};

/* DEPOSIT */
async function depositFunds(){
  const amt=parseFloat(fundInput.value);
  if(!amt||amt<=0)return alert("Invalid amount");

  try{
    await fetch(API+"/deposit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({amount:amt})});
    alert("Deposit successful");
    closeDepositModal();
    loadPortfolio();
  }catch{
    alert("Deposit failed");
  }
}

/* SEND */
async function sendFiat(){
  const amt=parseFloat(sendAmount.value);

  if(!amt||amt<=0)return alert("Invalid amount");
  if(amt>balance)return alert("Insufficient balance");

  try{
    await fetch(API+"/send",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({amount:amt})});
    alert("Transfer successful");
    closeSendModal();
    loadPortfolio();
    loadTransactions();
  }catch{
    alert("Transfer failed");
  }
}

/* PAYOUT */
function updatePayout(){
  payoutPercent=parseFloat(payoutPercentInput.value)||0;
  payoutFixed=parseFloat(payoutFixedInput.value)||0;
  calculatePayout();
}

function calculatePayout(){
  let val=payoutFixed>0?payoutFixed:balance*(payoutPercent/100);
  payout.innerText="$"+val.toFixed(2);
}

/* PORTFOLIO */
async function loadPortfolio(){
  try{
    const data=await (await fetch(API+"/portfolio")).json();
    balance=data.balance||0;

    balanceDisplay.innerText="$"+balance.toFixed(2);
    totalEarned.innerText="$"+(data.totalEarned||0).toFixed(2);

    calculatePayout();
  }catch{}
}

/* TRANSACTIONS */
async function loadTransactions(){
  const data=await (await fetch(API+"/transactions")).json();
  txTable.innerHTML="";

  data.forEach(tx=>{
    const row=document.createElement("tr");

    row.innerHTML=`
      <td>${tx.type.toUpperCase()}</td>
      <td>${tx.type==="send"?"-":"+"}$${tx.amount.toFixed(2)}</td>
      <td>${tx.status}</td>
      <td>${new Date(tx.time).toLocaleString()}</td>
    `;

    txTable.appendChild(row);
  });
}

/* INIT */
loadPortfolio();
</script>
</body>
</html>
