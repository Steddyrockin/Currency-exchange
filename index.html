<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Currency Exchange</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>

<style>
:root{
  --bg:#d4d4d4;
  --text:#000;
}
*{box-sizing:border-box;}
body{margin:0;padding:40px;background:var(--bg);color:var(--text);font-family:"JetBrains Mono",monospace;}
.container{max-width:1000px;margin:auto;}
h1{font-size:28px;letter-spacing:2px;border-bottom:1px solid black;padding-bottom:10px;margin-bottom:30px;text-align:center;}

.nav-links{display:flex;justify-content:center;gap:20px;margin-bottom:30px;font-size:14px;}
.nav-link{text-decoration:none;color:black;opacity:0.6;}
.nav-link.active{opacity:1;border-bottom:1px solid black;}

.panel{margin-top:30px;border:1px solid black;padding:25px;text-align:center;}
.panel strong{display:block;margin-bottom:12px;}

.blurb{
  font-size:14px;
  line-height:1.8;
  max-width:700px;
  margin:auto;
  text-align:left;
}

input, select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:1px solid black;
  background:black;
  color:white;
  text-align:center;
}

button{
  width:100%;
  margin-top:12px;
  padding:12px;
  background:black;
  color:white;
  border:1px solid black;
}
button:hover{background:white;color:black;}

.modal{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#d4d4d4;
  padding:30px;
  border:1px solid black;
  max-width:400px;
  width:100%;
  text-align:center;
}

.secondary{background:white;color:black;}
.secondary:hover{background:black;color:white;}
</style>
</head>

<body>
<div class="container">

<!-- NAV -->
<div class="nav-links">
<a href="#" class="nav-link active" onclick="switchView('market',this)">MARKET</a>
<a href="#" class="nav-link" onclick="switchView('transactions',this)">TRANSACTIONS</a>
</div>

<!-- MARKET -->
<div id="marketView" class="view active">
<h1>CURRENCY EXCHANGE</h1>

<div class="panel">
<strong>GLOBAL DOLLAR</strong>
<p id="liveGlobal">$0</p>
</div>

<div class="panel">
<strong>AI MARKET SYSTEM</strong>
<p class="blurb">
Currency Exchange monitors global markets in real time, analyzes price patterns, and automatically executes trades.
</p>
</div>

<table>
<thead>
<tr><th>ASSET</th><th>VALUE</th></tr>
</thead>
<tbody id="tradeTable"></tbody>
</table>

<div class="panel"><strong>BALANCE</strong><p>$0</p></div>
<div class="panel"><strong>TOTAL EARNED</strong><p>$0</p></div>
</div>

<!-- TRANSACTIONS (PARAGRAPH) -->
<div id="transactionsView" class="view">
<h1>TRANSACTIONS</h1>

<div class="panel">
<strong>TRANSACTION ACTIVITY</strong>
<p id="txParagraph" class="blurb"></p>
</div>

</div>

<!-- BANK -->
<div class="panel">
<strong>BANK</strong>
<button onclick="openDepositModal()">Deposit</button>
<button onclick="openWithdrawModal()">Send</button>
<button id="applePayBtn">Pay with  Apple Pay</button>
</div>

<!-- DEPOSIT MODAL -->
<div id="depositModal" class="modal">
<div class="modal-content">
<h2>Deposit</h2>
<input id="fundInput" type="number" placeholder="Amount"/>
<button onclick="depositFunds()">Submit</button>
<button class="secondary" onclick="closeDepositModal()">Cancel</button>
</div>
</div>

<!-- SEND MODAL -->
<div id="withdrawModal" class="modal">
<div class="modal-content">
<h2>Send</h2>

<select id="sendMethod" onchange="updateSendFields()">
<option value="bank">Bank Transfer</option>
<option value="zelle">Zelle</option>
</select>

<div id="bankFields">
<input id="routingNumber" placeholder="Routing Number"/>
<input id="accountNumber" placeholder="Account Number"/>
</div>

<div id="zelleFields" style="display:none;">
<input id="zelleEmail" placeholder="Zelle Email"/>
</div>

<input id="withdrawAmount" type="number" placeholder="Amount"/>

<button onclick="sendToBank()">Send</button>
<button class="secondary" onclick="closeWithdrawModal()">Cancel</button>
</div>
</div>

</div>

<script>
const API="http://localhost:4000/api";
const stripe=Stripe("pk_test_YOUR_PUBLIC_KEY");

let assets=["EURUSD","USDJPY","GBPUSD"];

/* VIEW */
function switchView(view,el){
event.preventDefault();
document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
document.querySelectorAll(".nav-link").forEach(l=>l.classList.remove("active"));

if(view==="market") marketView.classList.add("active");
if(view==="transactions"){
  transactionsView.classList.add("active");
  loadTransactions();
}

el.classList.add("active");
}

/* MARKET */
assets.forEach(a=>{
const row=document.createElement("tr");
row.innerHTML=`<td>${a}</td><td id="${a}">--</td>`;
tradeTable.appendChild(row);
});

setInterval(()=>{
assets.forEach(a=>{
document.getElementById(a).innerText=(Math.random()*2).toFixed(4);
});
},1000);

/* TRANSACTIONS PARAGRAPH */
function loadTransactions(){
const dummyText = `
Recent transaction activity includes deposits, transfers, and automated system allocations.
Funds have been successfully routed across banking networks and digital payment rails,
including bank transfers and Zelle disbursements.

All transactions are processed securely with real-time validation and status monitoring.
Completed transfers reflect successful settlement, while pending items are undergoing
verification and clearing procedures.

The system continuously optimizes transaction routing to ensure efficient capital flow,
low latency, and reliable execution across all supported financial channels.
`;

txParagraph.innerText = dummyText;
}

/* MODALS */
function openDepositModal(){depositModal.style.display="flex";}
function closeDepositModal(){depositModal.style.display="none";}
function openWithdrawModal(){withdrawModal.style.display="flex";}
function closeWithdrawModal(){withdrawModal.style.display="none";}

/* DEPOSIT */
async function depositFunds(){
const amt=parseFloat(fundInput.value);
if(!amt) return alert("Enter amount");
await fetch(API+"/stripe/deposit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({amount:amt})});
closeDepositModal();
}

/* SEND */
function updateSendFields(){
bankFields.style.display=sendMethod.value==="bank"?"block":"none";
zelleFields.style.display=sendMethod.value==="zelle"?"block":"block";
}

async function sendToBank(){
const amt=parseFloat(withdrawAmount.value);
if(!amt) return alert("Enter amount");

await fetch(API+"/bank/transfer",{method:"POST"});
closeWithdrawModal();
}

/* APPLE PAY */
async function setupApplePay(){
const pr=stripe.paymentRequest({country:'US',currency:'usd',total:{label:'Deposit',amount:1000}});
applePayBtn.onclick=()=>pr.show();
}
document.addEventListener("DOMContentLoaded",setupApplePay);
</script>
</body>
</html>
