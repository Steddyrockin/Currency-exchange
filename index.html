<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Currency Exchange</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>

<style>
:root{
  --bg:#d4d4d4;
  --text:#000;
}
*{box-sizing:border-box;}
body{margin:0;padding:40px;background:var(--bg);color:var(--text);font-family:"JetBrains Mono",monospace;}
.container{max-width:1000px;margin:auto;}
h1{font-size:28px;letter-spacing:2px;border-bottom:1px solid black;padding-bottom:10px;margin-bottom:30px;text-align:center;}

.nav-links{display:flex;justify-content:center;gap:20px;margin-bottom:30px;flex-wrap:wrap;font-size:14px;}
.nav-link{color:black;text-decoration:none;opacity:0.6;}
.nav-link.active{opacity:1;border-bottom:1px solid black;}

.panel{margin-top:30px;border:1px solid black;padding:25px;text-align:center;}
.panel strong{display:block;margin-bottom:12px;}
input,button{width:100%;padding:12px;margin-top:10px;background:black;color:white;border:1px solid black;}

table{width:100%;margin-top:30px;border-collapse:collapse;}
th,td{padding:14px;border-bottom:1px solid black;text-align:center;}

.view{display:none;}
.view.active{display:block;}

.footer{margin-top:50px;padding-top:20px;border-top:1px solid black;text-align:center;font-size:12px;}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;justify-content:center;align-items:center;}
.modal-content{background:#d4d4d4;padding:30px;border:1px solid black;width:100%;max-width:400px;}
</style>
</head>

<body>
<div class="container">

<div class="nav-links">
  <a href="#" class="nav-link active" onclick="switchView('market', this)">MARKET</a>
  <a href="#" class="nav-link" onclick="switchView('global', this)">GLOBAL</a>
  <a href="#" class="nav-link" onclick="switchView('transactions', this)">TRANSACTIONS</a>
</div>

<!-- MARKET -->
<div id="marketView" class="view active">
<h1>CURRENCY EXCHANGE</h1>

<div class="panel">
  <strong>GLOBAL DOLLAR</strong>
  <p id="liveGlobal">$0</p>
</div>

<div class="panel">
  <strong>ADD FUNDS</strong>
  <button onclick="openDepositModal()">DEPOSIT FUNDS</button>
</div>

<table>
<thead>
<tr><th>ASSET</th><th>VALUE</th><th>CHANGE</th><th>NET %</th></tr>
</thead>
<tbody id="tradeTable"></tbody>
</table>

<!-- ✅ UPDATED -->
<div class="panel"><strong>BALANCE</strong><p id="balanceAmount">$0</p></div>

<div class="panel"><strong>DAILY PAYOUT</strong><p id="payout">$0</p></div>
<div class="panel"><strong>TOTAL EARNED</strong><p id="totalEarned">$0</p></div>
</div>

<!-- GLOBAL -->
<div id="globalView" class="view">
<h1>GLOBAL DOLLAR</h1>
<div class="panel"><strong>TOTAL MARKET VALUE</strong><p id="globalValue">$0</p></div>
<div class="panel"><strong>CHANGE</strong><p id="netFlow">$0</p></div>
<div class="panel"><strong>NET %</strong><p id="systemProfit">0%</p></div>
</div>

<!-- TRANSACTIONS -->
<div id="transactionsView" class="view">
<h1>TRANSACTIONS</h1>
<table>
<thead>
<tr><th>TYPE</th><th>AMOUNT</th><th>STATUS</th><th>TIME</th></tr>
</thead>
<tbody id="txTable"></tbody>
</table>
</div>

<!-- MODAL -->
<div id="depositModal" class="modal" onclick="outsideClose(event)">
<div class="modal-content">
<h3>Deposit Funds</h3>
<select id="currencySelect">
<option value="USD">USD</option>
<option value="EUR">EUR</option>
<option value="GBP">GBP</option>
</select>
<input type="number" id="fundInput" placeholder="Enter amount"/>
<button onclick="depositFunds()">Submit</button>
</div>
</div>

<div class="footer">
© <span id="currentYear"></span> Clean, Inc.
</div>

</div>

<script>
const API = "http://localhost:4000/api";

let assets=["EURUSD","USDJPY","GBPUSD"];
let previous={},prices={};

document.addEventListener("DOMContentLoaded",()=>{
  buildTable();
  loadMarket();
  loadPortfolio();
  setInterval(loadMarket,10000);
  setInterval(updateMarket,1000);
  document.getElementById("currentYear").innerText=new Date().getFullYear();
});

function switchView(view,el){
  event.preventDefault();
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.querySelectorAll(".nav-link").forEach(l=>l.classList.remove("active"));
  document.getElementById(view+"View").classList.add("active");
  el.classList.add("active");
}

function buildTable(){
  assets.forEach(a=>{
    let row=document.createElement("tr");
    row.innerHTML=`<td>${a}</td><td id="${a}">--</td><td id="change${a}">-</td><td id="net${a}">-</td>`;
    tradeTable.appendChild(row);
  });
}

async function loadMarket(){
  const res=await fetch("https://api.exchangerate.host/latest?base=USD");
  const r=(await res.json()).rates;
  prices={EURUSD:1/r.EUR,USDJPY:r.JPY,GBPUSD:1/r.GBP};
}

function updateMarket(){
  Object.keys(prices).forEach(a=>{
    let base=prices[a];
    let sim=previous[a]?previous[a]+(Math.random()-0.5)*base*0.0005:base;
    document.getElementById(a).innerText=sim.toFixed(4);
    previous[a]=sim;
  });
}

/* MODAL */
function openDepositModal(){depositModal.style.display="flex";}
function closeDepositModal(){depositModal.style.display="none";}
function outsideClose(e){if(e.target.id==="depositModal") closeDepositModal();}

/* DEPOSIT */
async function depositFunds(){
  let amt=parseFloat(fundInput.value);
  let currency=currencySelect.value;
  if(!amt||amt<=0) return alert("Invalid amount");

  await fetch(API+"/stripe/deposit",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({amount:amt,currency})
  });

  fundInput.value="";
  closeDepositModal();
  loadPortfolio();
}

/* ✅ UPDATED PORTFOLIO */
async function loadPortfolio(){
  const data=await (await fetch(API+"/portfolio")).json();

  payout.innerText="$"+((data.dailyProfit||0)*0.30).toFixed(2);
  totalEarned.innerText="$"+(data.totalEarned||0).toFixed(2);

  /* 🔥 BALANCE (fallback safe) */
  balanceAmount.innerText="$"+(data.balance ?? data.allocated ?? 0).toFixed(2);
}
</script>
</body>
</html>
