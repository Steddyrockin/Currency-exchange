<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Currency Exchange</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Roboto+Mono&display=swap" rel="stylesheet">

<style>

:root{
--bg:#d4d4d4;
--text:#000;
}

*{box-sizing:border-box;}

body{
margin:0;
padding:40px;
background:var(--bg);
color:var(--text);
font-family:"JetBrains Mono","Roboto Mono","SF Mono",monospace;
}

.container{max-width:1000px;margin:auto;}

h1{
font-size:28px;
letter-spacing:2px;
border-bottom:1px solid black;
padding-bottom:10px;
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid black;
font-size:14px;
}

button{
width:100%;
margin-top:12px;
padding:12px;
background:black;
color:white;
border:1px solid black;
cursor:pointer;
font-family:inherit;
}

button:hover{
background:white;
color:black;
}

input{
width:100%;
padding:12px;
background:black;
border:1px solid black;
color:white;
margin-top:10px;
font-family:inherit;
}

.panel{
margin-top:30px;
border:1px solid black;
padding:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>CURRENCY EXCHANGE</h1>

<button onclick="facebookLogin()">LOGIN WITH FACEBOOK</button>

<table>
<thead>
<tr>
<th>TRADE</th>
<th>VALUE</th>
<th>CHANGE</th>
<th>NET %</th>
</tr>
</thead>
<tbody id="tradeTable"></tbody>
</table>

<div class="panel">
<strong>ADD FUNDS</strong>
<input type="number" id="fundInput" placeholder="Enter USD amount"/>
<button onclick="addFunds()">ADD FUNDS</button>
<div>BALANCE: $<span id="balance">0</span></div>
</div>

<div class="panel">
<strong>DAILY PAYOUT (30%)</strong>
<p id="payout">$0</p>
<p><strong>JPMorgan Chase & Co.</strong></p>
</div>

<div class="panel">
<strong>SIMULATOR MODE</strong>
<button onclick="toggleSimulator()">TOGGLE SIMULATOR</button>
<div>MODE: <span id="simStatus">OFF</span></div>
<div>SIM BALANCE: $<span id="simBalance">1000</span></div>
<div>SIM PNL: $<span id="simPnl">0</span></div>
</div>

</div>

<script>

const API = "http://localhost:4000/api"

let balance = 0
let startOfDayBalance = 0

let simulatorOn = false
let simBalance = 1000
let simStartBalance = 1000

let trades = [
"EURUSD","USDJPY","GBPUSD","AUDUSD","USDCAD",
"USDCHF","EURJPY","EURGBP","USDHKD","EURCHF","USDKRW",
"XAUUSD","XAGUSD"
]

let previous = {}
let prices = {}

const symbols = {
USD:"$", EUR:"€", GBP:"£", JPY:"¥",
CAD:"C$", AUD:"A$", HKD:"HK$", KRW:"₩",
CHF:"CHF",
XAU:"XAU", XAG:"XAG"
}

function getDisplay(pair){

if(pair==="XAUUSD") return "XAU/USD"
if(pair==="XAGUSD") return "XAG/USD"

return pair.substring(0,3)+"/"+pair.substring(3,6)

}

function buildTable(){

const table = document.getElementById("tradeTable")

trades.forEach(pair=>{

const row = document.createElement("tr")

row.innerHTML = `
<td>${getDisplay(pair)}</td>
<td id="${pair}">--</td>
<td id="change${pair}">-</td>
<td id="net${pair}">-</td>
`

table.appendChild(row)

})

}

async function loadForex(){

try{

const res = await fetch("https://api.exchangerate.host/latest?base=USD")
const data = await res.json()
const r = data.rates

prices = {
EURUSD:1/r.EUR,
USDJPY:r.JPY,
GBPUSD:1/r.GBP,
AUDUSD:1/r.AUD,
USDCAD:r.CAD,
USDCHF:r.CHF,
EURJPY:r.JPY/r.EUR,
EURGBP:r.GBP/r.EUR,
USDHKD:r.HKD,
EURCHF:r.CHF/r.EUR,
USDKRW:r.KRW,
XAUUSD:2000 + (Math.random()*20),
XAGUSD:25 + (Math.random()*1)
}

}catch(e){}

}

function updateTrades(){

Object.keys(prices).forEach(pair=>{

const base = prices[pair]
if(!base) return

const simulated = base + (Math.random()-0.5)*base*0.0005

document.getElementById(pair).innerText =
simulated.toFixed(4)

if(previous[pair]){

const diff = simulated - previous[pair]
const percent = (diff/previous[pair])*100

document.getElementById("change"+pair).innerText =
diff.toFixed(5)

document.getElementById("net"+pair).innerText =
percent.toFixed(3)+"%"

}

previous[pair] = simulated

})

}

function toggleSimulator(){

simulatorOn = !simulatorOn
document.getElementById("simStatus").innerText =
simulatorOn ? "ON" : "OFF"

}

function runSimulator(){

if(!simulatorOn) return

Object.keys(prices).forEach(()=>{

const direction = Math.random() > 0.5 ? 1 : -1
const change = (Math.random()*0.0005)*direction
const tradeResult = simBalance * change
simBalance += tradeResult

})

const pnl = simBalance - simStartBalance

document.getElementById("simBalance").innerText =
simBalance.toFixed(2)

document.getElementById("simPnl").innerText =
pnl.toFixed(2)

}

async function addFunds(){

const input = document.getElementById("fundInput")
const amount = parseFloat(input.value)

if(!amount || amount<=0) return alert("Invalid amount")

await fetch(API+"/stripe/deposit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({amount})
})

balance += amount

document.getElementById("balance").innerText =
balance.toFixed(2)

input.value=""
runAI()

}

async function runAI(){
await fetch(API+"/ai/run",{method:"POST"})
}

function resetDailyProfit(){
startOfDayBalance = balance
}

setInterval(()=>{
const now = new Date()
if(now.getHours()===23 && now.getMinutes()===59){
resetDailyProfit()
}
},60000)

buildTable()
loadForex()

setInterval(()=>{
loadForex()
updateTrades()
runSimulator()
},1000)

</script>

</body>
</html>
