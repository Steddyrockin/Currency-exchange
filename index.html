<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Currency Exchange</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Roboto+Mono&display=swap" rel="stylesheet">

<style>

:root{
--bg:#d4d4d4;
--text:#000;
}

*{box-sizing:border-box;}

body{
margin:0;
padding:40px;
background:var(--bg);
color:var(--text);
font-family:"JetBrains Mono","Roboto Mono","SF Mono",monospace;
}

.container{max-width:1000px;margin:auto;}

h1{
font-size:28px;
letter-spacing:2px;
border-bottom:1px solid black;
padding-bottom:10px;
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
}

th,td{
padding:15px;
border-bottom:1px solid black;
}

button{
width:100%;
margin-top:15px;
padding:12px;
background:black;
color:white;
border:1px solid black;
cursor:pointer;
font-family:inherit;
}

button:hover{
background:white;
color:black;
}

input{
width:100%;
padding:12px;
background:black;
border:1px solid black;
color:white;
margin-top:10px;
font-family:inherit;
}

.panel{
margin-top:40px;
border:1px solid black;
padding:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>CURRENCY EXCHANGE</h1>

<p style="margin-top:10px; font-size:14px;">
Make money all day.
</p>

<button onclick="facebookLogin()">LOGIN WITH FACEBOOK</button>

<table>
<thead>
<tr>
<th>TRADE</th>
<th>VALUE</th>
<th>CHANGE</th>
<th>NET %</th>
</tr>
</thead>
<tbody id="tradeTable"></tbody>
</table>

<div class="panel">
<strong>ADD FUNDS</strong>
<input type="number" id="fundInput" placeholder="Enter USD amount"/>
<button onclick="addFunds()">ADD FUNDS</button>
<div>BALANCE: $<span id="balance">0</span></div>
</div>

<div class="panel">
<strong>DAILY PAYOUT (30%)</strong>
<p id="payout">$0</p>
<p><strong>JPMorgan Chase & Co.</strong></p>
</div>

</div>

<script>

const API = "http://localhost:4000/api"

let balance = 0

let trades = [
"EURUSD","USDJPY","GBPUSD","AUDUSD","USDCAD",
"USDCHF","EURJPY","EURGBP","USDHKD","EURCHF","USDKRW"
]

let previous = {}
let prices = {}

function buildTable(){

const table = document.getElementById("tradeTable")

trades.forEach(pair=>{

const row = document.createElement("tr")

row.innerHTML = `
<td>${pair}</td>
<td id="${pair}">--</td>
<td id="change${pair}">-</td>
<td id="net${pair}">-</td>
`

table.appendChild(row)

})

}

async function loadForex(){

try{

const res = await fetch("https://api.exchangerate.host/latest?base=USD")
const data = await res.json()
const r = data.rates

prices = {
EURUSD:1/r.EUR,
USDJPY:r.JPY,
GBPUSD:1/r.GBP,
AUDUSD:1/r.AUD,
USDCAD:r.CAD,
USDCHF:r.CHF,
EURJPY:r.JPY/r.EUR,
EURGBP:r.GBP/r.EUR,
USDHKD:r.HKD,
EURCHF:r.CHF/r.EUR,
USDKRW:r.KRW
}

}catch(e){}

}

function updateTrades(){

Object.keys(prices).forEach(pair=>{

const base = prices[pair]
if(!base) return

const simulated = base + (Math.random()-0.5)*base*0.0005

document.getElementById(pair).innerText =
simulated.toFixed(4)

if(previous[pair]){

const diff = simulated - previous[pair]
const percent = (diff/previous[pair])*100

document.getElementById("change"+pair).innerText =
diff.toFixed(5)

document.getElementById("net"+pair).innerText =
percent.toFixed(3)+"%"

}

previous[pair] = simulated

})

}

async function loadPortfolio(){

try{

const res = await fetch(API + "/portfolio")
const data = await res.json()

balance = data.balance || 0

document.getElementById("balance").innerText =
balance.toFixed(2)

const profit = data.dailyProfit || 0
const payout = profit * 0.30

document.getElementById("payout").innerText =
"$" + payout.toFixed(2)

}catch(e){}

}

async function addFunds(){

const input = document.getElementById("fundInput")
const amount = parseFloat(input.value)

if(!amount || amount<=0) return alert("Invalid amount")

await fetch(API+"/stripe/deposit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({amount})
})

balance += amount
document.getElementById("balance").innerText =
balance.toFixed(2)

input.value=""

runAI()

}

async function runAI(){
await fetch(API+"/ai/run",{method:"POST"})
console.log("AI Trading Started")
}

window.fbAsyncInit = function(){
FB.init({
appId:'FACEBOOK_APP_ID',
cookie:true,
xfbml:true,
version:'v19.0'
})
}

function facebookLogin(){
FB.login(function(response){
if(response.authResponse){
fetch(API+"/auth/facebook",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(response.authResponse)
})
}
})
}

buildTable()
loadForex()
loadPortfolio()

setInterval(loadForex,10000)
setInterval(updateTrades,1000)
setInterval(loadPortfolio,60000)

</script>

<script async defer crossorigin="anonymous"
src="https://connect.facebook.net/en_US/sdk.js"></script>

</body>
</html>
