<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Currency Exchange</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://js.stripe.com/v3/"></script>

<style>
:root{
  --bg:#d4d4d4;
  --text:#000;
}

*{box-sizing:border-box;}

body{
  margin:0;
  padding:40px;
  background:var(--bg);
  color:var(--text);
  font-family:"JetBrains Mono", monospace;
}

.container{max-width:1000px;margin:auto;}

h1{
  font-size:28px;
  letter-spacing:2px;
  border-bottom:1px solid black;
  padding-bottom:10px;
  margin-bottom:30px;
  text-align:center;
}

/* NAV */
.nav-links{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:30px;
  flex-wrap:wrap;
  font-size:14px;
}
.nav-link{
  text-decoration:none;
  color:black;
  padding-bottom:4px;
  border-bottom:1px solid transparent;
  opacity:0.6;
}
.nav-link:hover{border-bottom:1px solid black;opacity:1;}
.nav-link.active{border-bottom:1px solid black;font-weight:bold;opacity:1;}

/* PANELS */
.panel{
  margin-top:30px;
  border:1px solid black;
  padding:25px;
  text-align:center;
}
.panel strong{display:block;margin-bottom:12px;}
.blurb{
  font-size:14px;
  line-height:1.6;
  max-width:700px;
  margin:auto;
}

/* GLOBAL INPUTS */
input, select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:1px solid black;
  text-align:center;
  font-family:"JetBrains Mono", monospace;
  font-size:14px;
  background:black;
  color:white;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;

  opacity:0;
  pointer-events:none;
  transition:opacity 0.25s ease;
}
.modal.show{
  opacity:1;
  pointer-events:auto;
}

/* MODAL CONTENT */
.modal-content{
  background:#d4d4d4;
  padding:30px;
  border:1px solid black;
  max-width:400px;
  width:100%;
  text-align:center;

  font-family:"Inter", sans-serif;

  transform:scale(0.95);
  opacity:0;
  transition:all 0.25s ease;
}
.modal.show .modal-content{
  transform:scale(1);
  opacity:1;
}

.modal-content h2{
  font-size:20px;
  font-weight:600;
  margin-bottom:20px;
}

/* FLOATING FIELDS */
.field{
  position:relative;
  margin-top:18px;
}

.field input,
.field select{
  width:100%;
  padding:16px 14px 10px 14px;
  border:1px solid #ccc;
  border-radius:6px;
  background:white;
  color:black;
  font-size:14px;
  font-family:"Inter", sans-serif;
  text-align:left;
  transition:all 0.2s ease;
}

/* Mono numbers */
.field input[type="number"]{
  font-family:"JetBrains Mono", monospace;
}

/* LABEL */
.field label{
  position:absolute;
  left:12px;
  top:14px;
  font-size:13px;
  color:#777;
  background:#d4d4d4;
  padding:0 6px;
  transition:all 0.2s ease;
  pointer-events:none;
}

/* FLOAT */
.field input:focus + label,
.field input:not(:placeholder-shown) + label,
.field select:focus + label,
.field select:valid + label{
  top:-8px;
  font-size:11px;
  color:black;
}

/* FOCUS */
.field input:focus,
.field select:focus{
  outline:none;
  border:1px solid black;
  box-shadow:0 0 0 2px rgba(0,0,0,0.08);
}

/* BUTTONS */
button{
  width:100%;
  margin-top:14px;
  padding:12px;
  background:black;
  color:white;
  border:1px solid black;
  cursor:pointer;
  font-family:"Inter", sans-serif;
}
button:hover{background:white;color:black;}

.secondary{
  background:white;color:black;
}
.secondary:hover{
  background:black;color:white;
}

.apple-pay-btn{margin-top:10px;padding:14px;}

/* TABLE */
table{width:100%;margin-top:30px;border-collapse:collapse;}
th,td{
  padding:14px;
  border-bottom:1px solid black;
  text-align:center;
  font-size:14px;
}

/* VIEWS */
.view{display:none;}
.view.active{display:block;}

/* FOOTER */
.footer{
  margin-top:50px;
  padding-top:20px;
  border-top:1px solid black;
  display:flex;
  justify-content:center;
  font-size:12px;
}
</style>
</head>

<body>
<div class="container">

<!-- NAV -->
<div class="nav-links">
  <a href="#" class="nav-link active" onclick="switchView('market', this)">MARKET</a>
  <a href="#" class="nav-link" onclick="switchView('transactions', this)">TRANSACTIONS</a>
</div>

<!-- MARKET -->
<div id="marketView" class="view active">
<h1>CURRENCY EXCHANGE</h1>

<div class="panel">
<strong>GLOBAL DOLLAR</strong>
<p id="liveGlobal">$0</p>
</div>

<div class="panel">
<strong>AI MARKET SYSTEM</strong>
<p class="blurb">
Currency Exchange monitors global markets in real time, analyzes price patterns, and automatically executes trades.
</p>
</div>

<table>
<thead>
<tr><th>ASSET</th><th>VALUE</th><th>CHANGE</th><th>NET %</th></tr>
</thead>
<tbody id="tradeTable"></tbody>
</table>
</div>

<!-- BANK -->
<div class="panel">
<strong>BANK</strong>
<button onclick="openDepositModal()">Deposit</button>
<button onclick="openWithdrawModal()">Send</button>
<button id="applePayBtn" class="apple-pay-btn">Pay with  Apple Pay</button>
</div>

<!-- DEPOSIT MODAL -->
<div id="depositModal" class="modal">
  <div class="modal-content">
    <h2>Deposit</h2>

    <div class="field">
      <select id="currencySelect" required>
        <option value="" disabled selected></option>
        <option value="USD">USD – US Dollar</option>
        <option value="EUR">EUR – Euro</option>
      </select>
      <label>Currency</label>
    </div>

    <div class="field">
      <input type="number" id="fundInput" placeholder=" " />
      <label>Amount</label>
    </div>

    <button onclick="depositFunds()">Submit</button>
    <button class="secondary" onclick="closeDepositModal()">Cancel</button>
  </div>
</div>

<!-- WITHDRAW MODAL -->
<div id="withdrawModal" class="modal">
  <div class="modal-content">
    <h2>Send</h2>

    <div class="field">
      <select id="sendMethod" onchange="updateSendFields()" required>
        <option value="" disabled selected></option>
        <option value="bank">Bank Transfer</option>
        <option value="zelle">Zelle</option>
      </select>
      <label>Method</label>
    </div>

    <div id="bankFields">
      <div class="field">
        <input id="routingNumber" placeholder=" " />
        <label>Routing Number</label>
      </div>

      <div class="field">
        <input id="accountNumber" placeholder=" " />
        <label>Account Number</label>
      </div>
    </div>

    <div id="zelleFields" style="display:none;">
      <div class="field">
        <input id="zelleEmail" placeholder=" " />
        <label>Zelle Email or Phone</label>
      </div>
    </div>

    <div class="field">
      <input id="withdrawAmount" type="number" placeholder=" " />
      <label>Amount</label>
    </div>

    <button onclick="sendToBank()">Submit Transfer</button>
    <button class="secondary" onclick="closeWithdrawModal()">Cancel</button>
  </div>
</div>

<div class="footer">
<span>© <span id="year"></span> Clean, Inc.</span>
</div>

</div>

<script>
document.getElementById("year").innerText=new Date().getFullYear();

/* MODALS */
function openDepositModal(){
  depositModal.style.display="flex";
  setTimeout(()=>depositModal.classList.add("show"),10);
}
function closeDepositModal(){
  depositModal.classList.remove("show");
  setTimeout(()=>depositModal.style.display="none",250);
}

function openWithdrawModal(){
  withdrawModal.style.display="flex";
  setTimeout(()=>withdrawModal.classList.add("show"),10);
}
function closeWithdrawModal(){
  withdrawModal.classList.remove("show");
  setTimeout(()=>withdrawModal.style.display="none",250);
}

/* TOGGLE SEND TYPE */
function updateSendFields(){
  if(sendMethod.value==="bank"){
    bankFields.style.display="block";
    zelleFields.style.display="none";
  }else{
    bankFields.style.display="none";
    zelleFields.style.display="block";
  }
}
</script>

</body>
</html>
