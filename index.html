<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Currency Exchange</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#d4d4d4;
  --card:#ffffff;
  --text:#111;
  --border:#cfcfcf;
  --accent:#000;
}

*{box-sizing:border-box;}

body{
  margin:0;
  background:var(--bg);
  font-family:"Inter",system-ui,-apple-system,sans-serif;
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:40px;
}

.container{
  width:1100px;
}

h1{
  margin:0 0 20px 0;
  font-size:28px;
  font-weight:600;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

th{
  text-align:left;
  padding:10px 6px;
  border-bottom:1px solid var(--border);
  font-weight:600;
}

td{
  padding:10px 6px;
  border-bottom:1px solid var(--border);
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:white;
  font-weight:500;
  cursor:pointer;
  transition:0.2s ease;
}

button:hover{
  opacity:0.85;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  margin-top:8px;
  font-size:14px;
}

.balance{
  font-size:18px;
  font-weight:600;
}

.small{
  font-size:13px;
  color:#555;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

@media(max-width:900px){
  .grid{
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body>

<div class="container">

<h1>CURRENCY EXCHANGE</h1>

<p style="margin-top:10px; font-size:14px;">
Make money all day.
</p>

<button onclick="facebookLogin()">LOGIN WITH FACEBOOK</button>

<div class="grid">

<div class="card">

<table>
<thead>
<tr>
<th>PAIR</th>
<th>VALUE</th>
<th>Δ</th>
<th>%</th>
<th>ALLOC</th>
</tr>
</thead>
<tbody id="tradeTable"></tbody>
</table>

</div>

<div>

<div class="card">

<strong>ADD FUNDS</strong>
<input type="number" id="fundInput" placeholder="Enter USD amount"/>
<button onclick="addFunds()">ADD FUNDS</button>

<div class="balance" style="margin-top:10px;">
BALANCE: $<span id="balance">0</span>
</div>

</div>

<div class="card">

<strong>DAILY PAYOUT (30%)</strong>
<p id="payout">$0</p>
<p class="small">Sent to JPMorgan Chase & Co.</p>

</div>

<button onclick="runAI()">RUN AI TRADING</button>
<button onclick="runDistribution()">DISTRIBUTE</button>

</div>

</div>

</div>

<script>

const API="http://localhost:4000/api"

let balance=0

const trades=[
"EURUSD","USDJPY","GBPUSD","AUDUSD","USDCAD",
"USDCHF","EURJPY","EURGBP","USDHKD","EURCHF","USDKRW"
]

let previous={}
let prices={}

/* ===== BUILD TABLE ===== */

function buildTable(){

const table=document.getElementById("tradeTable")

trades.forEach((pair,i)=>{

const row=document.createElement("tr")

row.innerHTML=`
<td>${pair}</td>
<td id="${pair}">--</td>
<td id="change${pair}">-</td>
<td id="net${pair}">-</td>
<td id="alloc${i+1}">$0</td>
`

table.appendChild(row)

})

}

/* ===== LOAD FOREX ===== */

async function loadForex(){

const res=await fetch("https://api.exchangerate.host/latest?base=USD")
const data=await res.json()
const r=data.rates

prices={
EURUSD:1/r.EUR,
USDJPY:r.JPY,
GBPUSD:1/r.GBP,
AUDUSD:1/r.AUD,
USDCAD:r.CAD,
USDCHF:r.CHF,
EURJPY:r.JPY/r.EUR,
EURGBP:r.GBP/r.EUR,
USDHKD:r.HKD,
EURCHF:r.CHF/r.EUR,
USDKRW:r.KRW
}

}

/* ===== UPDATE UI ===== */

function updateTrades(){

Object.keys(prices).forEach(pair=>{

const base=prices[pair]
const simulated=base+(Math.random()-0.5)*base*0.0005

document.getElementById(pair).innerText=
simulated.toFixed(4)

if(previous[pair]){

const diff=simulated-previous[pair]
const percent=(diff/previous[pair])*100

document.getElementById("change"+pair).innerText=
diff.toFixed(5)

document.getElementById("net"+pair).innerText=
percent.toFixed(3)+"%"

}

previous[pair]=simulated

})

}

/* ===== ADD FUNDS ===== */

async function addFunds(){

const amount=parseFloat(
document.getElementById("fundInput").value
)

if(!amount||amount<=0) return

await fetch(API+"/stripe/deposit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({amount})
})

balance+=amount
document.getElementById("balance").innerText=
balance.toFixed(2)

}

/* ===== AI ===== */

async function runAI(){
await fetch(API+"/ai/run",{method:"POST"})
alert("AI ENGINE ACTIVE")
}

/* ===== DISTRIBUTION ===== */

async function runDistribution(){

if(balance<=0) return

const allocation=balance/trades.length

for(let i=1;i<=trades.length;i++){
document.getElementById("alloc"+i).innerText=
"$"+allocation.toFixed(2)
}

const payout=balance*0.30
document.getElementById("payout").innerText=
"$"+payout.toFixed(2)

await fetch(API+"/portfolio/distribute",{method:"POST"})

}

/* ===== FACEBOOK LOGIN ===== */

window.fbAsyncInit=function(){
FB.init({
appId:"FACEBOOK_APP_ID",
cookie:true,
xfbml:true,
version:"v19.0"
})
}

function facebookLogin(){
FB.login(function(response){
if(response.authResponse){
fetch(API+"/auth/facebook",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(response.authResponse)
})
}
})
}

/* ===== INIT ===== */

buildTable()
loadForex()

setInterval(loadForex,10000)
setInterval(updateTrades,1000)

</script>

<script async defer
src="https://connect.facebook.net/en_US/sdk.js">
</script>

</body>
</html>
