<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Currency Exchange</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>

<style>
:root{--bg:#d4d4d4;--text:#000;}
*{box-sizing:border-box;}
body{
margin:0;
padding:40px;
background:var(--bg);
color:var(--text);
font-family:"JetBrains Mono",monospace;
}
.container{max-width:1000px;margin:auto;}
h1{
font-size:28px;
letter-spacing:2px;
border-bottom:1px solid black;
padding-bottom:10px;
margin-bottom:30px;
text-align:center;
}

/* NAV */
.nav-links{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:30px;
flex-wrap:wrap;
font-size:14px;
}
.nav-link{color:black;text-decoration:none;opacity:.6;}
.nav-link.active{opacity:1;font-weight:bold;border-bottom:1px solid black;}

/* UI */
.panel{
margin-top:30px;
border:1px solid black;
padding:25px;
text-align:center;
}
input,button{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid black;
}
input{background:black;color:white;}
button{background:black;color:white;cursor:pointer;}
button:hover{background:white;color:black;}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
}
th,td{
padding:14px;
border-bottom:1px solid black;
text-align:center;
}

.view{display:none;}
.view.active{display:block;}

.footer{
margin-top:50px;
text-align:center;
font-size:12px;
}
</style>
</head>

<body>
<div class="container">

<!-- NAV -->
<div class="nav-links">
<a href="#" class="nav-link active" onclick="switchView('market', this)">MARKET</a>
<a href="#" class="nav-link" onclick="switchView('transactions', this)">TRANSACTIONS</a>
</div>

<!-- MARKET -->
<div id="marketView" class="view active">
<h1>CURRENCY EXCHANGE</h1>

<div class="panel">
<strong>GLOBAL VALUE</strong>
<p id="liveGlobal">$0</p>
</div>

<div class="panel">
<strong>AI SYSTEM</strong>
<p>This currency exchange wallet monitors markets, analyzes patterns, and executes trades automatically.</p>
</div>

<div class="panel">
<strong>ADD FUNDS</strong>
<input type="number" id="fundInput" placeholder="Enter USD"/>
<button onclick="depositFunds()">SUBMIT</button>
</div>

<table>
<thead>
<tr><th>ASSET</th><th>VALUE</th><th>CHANGE</th></tr>
</thead>
<tbody id="tradeTable"></tbody>
</table>
</div>

<!-- TRANSACTIONS -->
<div id="transactionsView" class="view">
<h1>TRANSACTIONS</h1>

<!-- SEND TO BANK -->
<div class="panel">
<strong>SEND TO BANK</strong>
<input type="number" id="transferAmount" placeholder="Amount"/>
<input type="text" id="accountNumber" placeholder="Account Number"/>
<input type="text" id="routingNumber" placeholder="Routing Number"/>
<button onclick="sendToBank()">SEND</button>
</div>

<table>
<thead>
<tr><th>TYPE</th><th>AMOUNT</th><th>STATUS</th><th>TIME</th></tr>
</thead>
<tbody id="txTable"></tbody>
</table>
</div>

<div class="footer">
© 2026 Clean, Inc. | <a href="mailto:steddyrockin@gmail.com">Contact</a>
</div>

</div>

<script>
const API="http://localhost:4000/api"

let assets=["EURUSD","USDJPY","GBPUSD"]
let prices={}, previous={}, globalValue=0

document.addEventListener("DOMContentLoaded",()=>{
buildTable()
setInterval(updateMarket,2000)
loadTransactions()
})

function switchView(view,el){
event.preventDefault()
document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"))
document.querySelectorAll(".nav-link").forEach(l=>l.classList.remove("active"))

if(view==="market") marketView.classList.add("active")
if(view==="transactions") transactionsView.classList.add("active")

el.classList.add("active")
}

function buildTable(){
assets.forEach(a=>{
const row=document.createElement("tr")
row.innerHTML=`<td>${a}</td><td id="${a}">--</td><td id="c${a}">-</td>`
tradeTable.appendChild(row)
})
}

function updateMarket(){
assets.forEach(a=>{
const val=(Math.random()*100).toFixed(2)
document.getElementById(a).innerText=val
})
globalValue=(Math.random()*1000).toFixed(2)
liveGlobal.innerText="$"+globalValue
}

async function depositFunds(){
const amt=parseFloat(fundInput.value)
if(!amt) return alert("Invalid")
await fetch(API+"/deposit",{method:"POST",body:JSON.stringify({amount:amt})})
fundInput.value=""
}

async function sendToBank(){
const amount=parseFloat(transferAmount.value)
const accountNumber=accountNumberInput()
const routingNumber=routingNumberInput()

if(!amount||!accountNumber||!routingNumber) return alert("Missing info")

await fetch(API+"/transfer/bank",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({amount,accountNumber,routingNumber})
})

alert("Transfer sent")
loadTransactions()
}

function accountNumberInput(){return document.getElementById("accountNumber").value}
function routingNumberInput(){return document.getElementById("routingNumber").value}

async function loadTransactions(){
const data=await fetch(API+"/transactions").then(r=>r.json()).catch(()=>[])
txTable.innerHTML=""
data.forEach(tx=>{
const row=document.createElement("tr")
row.innerHTML=`<td>${tx.type}</td><td>$${tx.amount}</td><td>${tx.status}</td><td>${tx.time}</td>`
txTable.appendChild(row)
})
}
</script>

</body>
</html>
