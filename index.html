<!DOCTYPE html>
<html>
<head>
<title>Currency Exchange</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Roboto+Mono&display=swap" rel="stylesheet">

<style>

body{
    background:black;
    color:white;
    font-family:"JetBrains Mono","Roboto Mono","SF Mono",monospace;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    font-size:28px;
    letter-spacing:2px;
    border-bottom:1px solid white;
    padding-bottom:10px;
}

table{
    width:100%;
    margin-top:30px;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    text-align:left;
    border-bottom:1px solid white;
}

.signal-buy{
    color:white;
    background:black;
    border:1px solid white;
    padding:4px 8px;

}

button:hover{
    background:white;
    color:black;
}

</style>

</head>

<body>

<div class="container">

<h1>CURRENCY EXCHANGE</h1>

<table>

<tr>
<th>TRADE</th>
<th>AMOUNT</th>
</tr>

<tr>
<td>EUR/USD</td>
<td>1.0932</td>
</tr>

</table>

<div class="panel">

<p>DAILY PAYOUT</p>

<p>USD: $58.00</p>

</div>

<div style="margin-top:30px;">

<button>RUN</button>


</div>

</div>

</body>
</html>
