<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Currency Exchange</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Roboto+Mono&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #000;
    --text: #fff;
    --border: #fff;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 40px;
    background: var(--bg);
    color: var(--text);
    font-family: "JetBrains Mono", "Roboto Mono", "SF Mono", monospace;
}

.container {
    max-width: 900px;
    margin: auto;
}

h1 {
    font-size: 28px;
    letter-spacing: 2px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
}

table {
    width: 100%;
    margin-top: 30px;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
}

.panel {
    margin-top: 40px;
    border: 1px solid var(--border);
    padding: 20px;
}

button {
    width: 100%;
    margin-top: 30px;
    padding: 12px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    cursor: pointer;
    font-family: inherit;
    transition: 0.2s ease;
}

button:hover {
    background: var(--text);
    color: var(--bg);
}
</style>
</head>

<body>

<div class="container">

<h1>CURRENCY EXCHANGE</h1>

<table>
<thead>
<tr>
<th>TRADE</th>
<th>PRICE</th>
</tr>
</thead>
<tbody>
<tr>
<td>EUR/USD</td>
<td>1.0932</td>
</tr>
</tbody>
</table>

<div class="panel">
<p><strong>DAILY PAYOUT</strong></p>
<p>USD: $58.00</p>
</div>

<button>RUN</button>

</div>

</body>
</html>
