<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Currency Exchange</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>

:root{
--bg:#d4d4d4;
--text:#000;
}

*{box-sizing:border-box;}

body{
margin:0;
padding:40px;
background:var(--bg);
color:var(--text);
font-family:"JetBrains Mono",monospace;
}

.container{max-width:1000px;margin:auto;}

h1{
font-size:28px;
letter-spacing:2px;
border-bottom:1px solid black;
padding-bottom:10px;
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid black;
font-size:14px;
color:black;
}

button{
width:100%;
margin-top:15px;
padding:12px;
background:black;
color:white;
border:1px solid black;
cursor:pointer;
font-family:inherit;
}

button:hover{
background:white;
color:black;
}

input{
width:100%;
padding:12px;
background:black;
border:1px solid black;
color:white;
margin-top:10px;
font-family:inherit;
}

.panel{
margin-top:40px;
border:1px solid black;
padding:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>CURRENCY EXCHANGE</h1>

<!-- 🔝 DEPOSIT -->
<div class="panel">
<strong>DEPOSIT</strong>
<input type="number" id="fundInput" placeholder="Enter USD amount"/>
<button onclick="depositFunds()">DEPOSIT</button>
</div>

<!-- 📊 TABLE -->
<table>
<thead>
<tr>
<th>ASSET</th>
<th>VALUE</th>
<th>CHANGE</th>
<th>NET %</th>
</tr>
</thead>
<tbody id="tradeTable"></tbody>
</table>

<!-- 🔄 ALLOCATED -->
<div class="panel">
<strong>ALLOCATED (IN CIRCULATION)</strong>
<p id="allocatedAmount">$0</p>
</div>

<!-- 📈 DAILY PAYOUT -->
<div class="panel">
<strong>DAILY PAYOUT (30% OF PROFIT)</strong>
<p id="payout">$0</p>
</div>

<!-- 🏆 TOTAL EARNED -->
<div class="panel">
<strong>TOTAL AMOUNT EARNED (LIFETIME)</strong>
<p id="totalEarned">$0</p>
</div>

</div>

<script>

const API = "http://localhost:4000/api"

let assets = [
"EURUSD","USDJPY","GBPUSD","AUDUSD","USDCAD",
"USDCHF","EURJPY","EURGBP","USDHKD","EURCHF","USDKRW",
"XAUUSD","XAGUSD","USOIL","NGAS"
]

let previous = {}
let prices = {}

document.addEventListener("DOMContentLoaded", function(){

buildTable()
loadMarket()
loadPortfolio()

setInterval(loadMarket,10000)
setInterval(updateMarket,1000)
setInterval(loadPortfolio,60000)

})

function buildTable(){

const table = document.getElementById("tradeTable")

assets.forEach(asset=>{

const row = document.createElement("tr")

row.innerHTML = `
<td>${asset}</td>
<td id="${asset}">--</td>
<td id="change${asset}">-</td>
<td id="net${asset}">-</td>
`

table.appendChild(row)

})

}

async function loadMarket(){

try{

const res = await fetch("https://api.exchangerate.host/latest?base=USD")
const data = await res.json()
const r = data.rates

prices = {
EURUSD:1/r.EUR,
USDJPY:r.JPY,
GBPUSD:1/r.GBP,
AUDUSD:1/r.AUD,
USDCAD:r.CAD,
USDCHF:r.CHF,
EURJPY:r.JPY/r.EUR,
EURGBP:r.GBP/r.EUR,
USDHKD:r.HKD,
EURCHF:r.CHF/r.EUR,
USDKRW:r.KRW,
XAUUSD:2000 + (Math.random()-0.5)*10,
XAGUSD:25 + (Math.random()-0.5)*0.5,
USOIL:75 + (Math.random()-0.5)*2,
NGAS:3 + (Math.random()-0.5)*0.1
}

}catch(e){}

}

function updateMarket(){

Object.keys(prices).forEach(asset=>{

const base = prices[asset]
if(!base) return

const simulated = base + (Math.random()-0.5)*base*0.0005

document.getElementById(asset).innerText =
simulated.toFixed(4)

if(previous[asset]){

const diff = simulated - previous[asset]
const percent = (diff/previous[asset])*100

const netCell = document.getElementById("net"+asset)

netCell.innerText = percent.toFixed(3)+"%"

if(percent > 0) netCell.style.color="green"
else if(percent < 0) netCell.style.color="red"
else netCell.style.color="black"

}

previous[asset] = simulated

})

}

async function loadPortfolio(){

try{

const res = await fetch(API+"/portfolio")
const data = await res.json()

const dailyProfit = data.dailyProfit || 0
let payout = dailyProfit > 0 ? dailyProfit * 0.30 : 0

document.getElementById("payout").innerText =
"$" + payout.toFixed(2)

document.getElementById("totalEarned").innerText =
"$" + (data.totalEarned || 0).toFixed(2)

document.getElementById("allocatedAmount").innerText =
"$" + (data.allocated || 0).toFixed(2)

}catch(e){}

}

async function depositFunds(){

const input = document.getElementById("fundInput")
const amount = parseFloat(input.value)

if(!amount || amount<=0) return alert("Invalid amount")

await fetch(API+"/stripe/deposit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({amount})
})

runAI()
input.value=""

}

async function runAI(){
await fetch(API+"/ai/run",{method:"POST"})
}

</script>

</body>
</html>
