<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Currency Exchange</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>

<style>
:root{--bg:#d4d4d4;--text:#000;}
*{box-sizing:border-box;}
body{margin:0;padding:40px;background:var(--bg);color:var(--text);font-family:"JetBrains Mono",monospace;}
.container{max-width:1000px;margin:auto;}
h1{font-size:28px;letter-spacing:2px;border-bottom:1px solid black;padding-bottom:10px;margin-bottom:30px;text-align:center;}

.nav-links{display:flex;justify-content:center;gap:20px;margin-bottom:30px;font-size:14px;}
.nav-link{text-decoration:none;color:black;opacity:0.6;}
.nav-link.active{opacity:1;border-bottom:1px solid black;}

.panel{margin-top:30px;border:1px solid black;padding:25px;text-align:center;}
input,select{width:100%;padding:12px;background:black;color:white;margin-top:10px;text-align:center;border:1px solid black;}
button{width:100%;margin-top:12px;padding:12px;background:black;color:white;border:1px solid black;cursor:pointer;}
button:hover{background:white;color:black;}

table{width:100%;margin-top:30px;border-collapse:collapse;}
th,td{padding:14px;border-bottom:1px solid black;text-align:center;}

.footer{margin-top:50px;border-top:1px solid black;padding-top:20px;text-align:center;font-size:12px;}
.footer a{color:black;text-decoration:none;}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;}
.modal-content{background:white;padding:20px;width:90%;max-width:400px;text-align:center;}
.modal-copy{font-size:14px;margin-bottom:10px;}
</style>
</head>

<body>
<div class="container">

<!-- NAV -->
<div class="nav-links">
<a href="#" class="nav-link active" onclick="switchView('market', this)">MARKET</a>
<a href="#" class="nav-link" onclick="switchView('transactions', this)">TRANSACTIONS</a>
</div>

<!-- MARKET -->
<div id="marketView">
<h1>CURRENCY EXCHANGE</h1>

<div class="panel">
<strong>GLOBAL DOLLAR</strong>
<p id="liveGlobal">$0</p>
</div>

<div class="panel">
<strong>ADD FUNDS</strong>
<button onclick="openDepositModal()">Deposit Funds</button>
<button id="applePayBtn" style="display:none;"> Pay</button>
</div>

<table>
<thead><tr><th>ASSET</th><th>VALUE</th></tr></thead>
<tbody id="tradeTable"></tbody>
</table>

</div>

<!-- TRANSACTIONS -->
<div id="transactionsView" style="display:none;">
<h1>TRANSACTIONS</h1>
<table>
<thead><tr><th>TYPE</th><th>AMOUNT</th></tr></thead>
<tbody id="txTable"></tbody>
</table>
</div>

<!-- MODAL -->
<div id="depositModal" class="modal" onclick="handleOutsideClick(event)">
  <div class="modal-content">
    <h2>Deposit Funds</h2>
    <p class="modal-copy">
      Select your currency and enter the amount. All transactions are encrypted and processed securely to protect your funds.
    </p>

    <select id="currencySelect">
      <option value="USD">$ USD – US Dollar</option>
      <option value="EUR">€ EUR – Euro</option>
      <option value="GBP">£ GBP – British Pound</option>
      <option value="JPY">¥ JPY – Japanese Yen</option>
      <option value="AUD">$ AUD – Australian Dollar</option>
      <option value="CAD">$ CAD – Canadian Dollar</option>
      <option value="CHF">CHF – Swiss Franc</option>
    </select>

    <input type="number" id="fundInput" placeholder="Enter amount"/>

    <button onclick="depositFunds()">Submit</button>
    <button onclick="closeDepositModal()">Cancel</button>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
© <span id="year"></span> Clean, Inc. |
<a href="mailto:steddyrockin@gmail.com">Contact</a>
</div>

</div>

<script>
document.getElementById("year").innerText = new Date().getFullYear();

function switchView(view, el){
document.getElementById("marketView").style.display = view==="market"?"block":"none";
document.getElementById("transactionsView").style.display = view==="transactions"?"block":"none";
}

function openDepositModal(){
document.getElementById('depositModal').style.display='flex';
}
function closeDepositModal(){
document.getElementById('depositModal').style.display='none';
}
function handleOutsideClick(e){
if(e.target.id==="depositModal") closeDepositModal();
}

async function depositFunds(){
const amt=document.getElementById("fundInput").value;
const currency=document.getElementById("currencySelect").value;
if(!amt) return alert("Enter amount");

console.log("Deposit:", amt, currency);
closeDepositModal();
}
</script>

</body>
</html>
